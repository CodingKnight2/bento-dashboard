name: PR Quality Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            test
            refactor
            style
            chore
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            doesn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.

  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check PR size
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          if [ $CHANGED_FILES -gt 20 ]; then
            echo "PR modifies $CHANGED_FILES files. Consider breaking into smaller PRs."
          fi

  pr-description:
    name: Check PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Verify description length
        run: |
          DESCRIPTION="${{ github.event.pull_request.body }}"
          if [ ${#DESCRIPTION} -lt 50 ]; then
            echo "Please add a detailed PR description (at least 50 characters)"
            exit 1
          fi